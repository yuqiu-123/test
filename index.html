            const narrativeMinimapToggle = document.getElementById('narrativeMinimapToggle');
            const narrativeMinimap = document.getElementById('narrativeMinimap');
            if (narrativeMinimapToggle && narrativeMinimap) {
                narrativeMinimapToggle.addEventListener('click', () => {
                    narrativeMinimap.classList.toggle('collapsed');
                    const isCollapsed = narrativeMinimap.classList.contains('collapsed');
                    narrativeMinimapToggle.textContent = isCollapsed ? '+' : '−';
                    // 如果展开，重新渲染以确保尺寸正确
                    if (!isCollapsed && cachedNarrativeData) {
                        setTimeout(() => {
                            renderNarrativeManifold(cachedNarrativeData);
                        }, 100);
                    }
                });
            }

            // ResizeObserver: 确保View C和View B能自适应新布局尺寸
            const gravityFieldContainer = document.getElementById('gravityFieldContainer');
            const narrativeManifoldContainer = document.getElementById('narrativeManifold');

            if (gravityFieldContainer && window.ResizeObserver) {
                const gravityResizeObserver = new ResizeObserver(entries => {
                    // 当重力场容器尺寸变化时，重新渲染
                    if (lastGravityGraph && connectionViewMode === 'gravity') {
                        // 使用防抖，避免频繁重新渲染
                        clearTimeout(window.gravityResizeTimeout);
                        window.gravityResizeTimeout = setTimeout(() => {
                            renderGravityField(lastGravityGraph);
                        }, 200);
                    }
                });
                gravityResizeObserver.observe(gravityFieldContainer);
            }

            if (narrativeManifoldContainer && window.ResizeObserver) {
                const narrativeResizeObserver = new ResizeObserver(entries => {
                    // 当小地图容器尺寸变化时，重新渲染
                    if (cachedNarrativeData) {
                        clearTimeout(window.narrativeResizeTimeout);
                        window.narrativeResizeTimeout = setTimeout(() => {
                            renderNarrativeManifold(cachedNarrativeData);
                        }, 200);
                    }
                });
                narrativeResizeObserver.observe(narrativeManifoldContainer);
            }

            const viewLinearBtn = document.getElementById('viewLinearBtn');
            const viewGravityBtn = document.getElementById('viewGravityBtn');
            if (viewLinearBtn) {
                viewLinearBtn.addEventListener('click', () => setConnectionViewMode('linear'));
            }
            if (viewGravityBtn) {
                viewGravityBtn.addEventListener('click', () => setConnectionViewMode('gravity'));
            }

            const selectToolBtn = document.getElementById('toolSelect');
            const bridgeToolBtn = document.getElementById('toolBridge');
            if (selectToolBtn && bridgeToolBtn) {
                selectToolBtn.addEventListener('click', () => setToolMode('select'));
                bridgeToolBtn.addEventListener('click', () => setToolMode('bridge'));
                updateToolModeUI();
            }

            // 时间轴拖动
            const timelineBar = document.getElementById('timelineBar');
            const timelineHandle = document.getElementById('timelineHandle');

            let isDragging = false;

            timelineHandle.addEventListener('mousedown', (e) => {
                isDragging = true;
                // 拖动时间轴时，如果正在播放则停止（虽然现在不再有逐步播放）
                if (playInterval) {
                    clearInterval(playInterval);
                    playInterval = null;
                }
                isPlaying = false;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const rect = timelineBar.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width));

                const timelineLength = attackData.timeline?.length || 1;
                const progress = x / rect.width;
                const round = Math.floor(progress * timelineLength);

                updateVisualization(round);
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });

            // 点击时间轴跳转
            timelineBar.addEventListener('click', (e) => {
                if (e.target === timelineHandle) return;

                const rect = timelineBar.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const timelineLen = attackData.timeline?.length || 1;
                const progress = x / rect.width;
                const round = Math.floor(progress * timelineLen);

                // 停止任何正在进行的播放
                if (playInterval) {
                    clearInterval(playInterval);
                    playInterval = null;
                }
                isPlaying = false;
                updateVisualization(round);

                // 更新播放按钮文字
                const btn = document.getElementById('playBtn');
                if (round >= timelineLen) {
                    btn.innerHTML = '<span>↻</span> 重置';
                } else {
                    btn.innerHTML = '<span>▶</span> 播放';
                }
            });
        }


        function updateToolModeUI() {
            const connectionView = document.querySelector('.connection-view');
            const selectBtn = document.getElementById('toolSelect');
            const bridgeBtn = document.getElementById('toolBridge');

            if (connectionView) {
                connectionView.classList.toggle('bridge-mode', currentToolMode === 'bridge');
                connectionView.classList.toggle('select-mode', currentToolMode === 'select');
            }

            if (selectBtn) {
                selectBtn.classList.toggle('active', currentToolMode === 'select');
                selectBtn.setAttribute('aria-pressed', String(currentToolMode === 'select'));
            }

            if (bridgeBtn) {
                bridgeBtn.classList.toggle('active', currentToolMode === 'bridge');
                bridgeBtn.setAttribute('aria-pressed', String(currentToolMode === 'bridge'));
            }
        }

        function setToolMode(mode) {
            if (mode !== 'select' && mode !== 'bridge') {
                return;
            }

            const isChange = currentToolMode !== mode;
            currentToolMode = mode;
            updateToolModeUI();
            if (isChange) {
                clearBridgeSelections();
            }
        }

        // 更新 View C Header（标题、副标题、统计指标）
        // @param {boolean} useAnimation - 是否使用淡入淡出动画（默认 true）
        function updateConnectionViewHeader(useAnimation = true) {
            const config = viewConfigs[connectionViewMode];
            if (!config) return;

            const titleElement = document.querySelector('.connection-view-title h2');
            const subtitleElement = document.querySelector('.connection-view-title p');
            const statsContainer = document.getElementById('connectionStats');

            if (!titleElement || !subtitleElement || !statsContainer) return;

            const updateContent = () => {
                // 更新标题和副标题
                titleElement.textContent = config.title;
                subtitleElement.textContent = config.subtitle;

                // 计算并更新统计指标
                const metrics = config.getMetrics(attackData, currentRound);
                statsContainer.innerHTML = metrics.map(metric => `
                    <div class="connection-stat">
                        <div class="connection-stat-value">${metric.value}</div>
                        <div class="connection-stat-label">${metric.label}</div>
                    </div>
                `).join('');
            };

            if (useAnimation) {
                // 添加淡出效果
                titleElement.style.opacity = '0';
                subtitleElement.style.opacity = '0';
                statsContainer.style.opacity = '0';

                // 延迟更新内容，实现淡入淡出过渡
                setTimeout(() => {
                    updateContent();

                    // 淡入效果
                    setTimeout(() => {
                        titleElement.style.opacity = '1';
                        subtitleElement.style.opacity = '1';
                        statsContainer.style.opacity = '1';
                    }, 50);
                }, 150);
            } else {
                // 不使用动画，直接更新
                updateContent();
                titleElement.style.opacity = '1';
                subtitleElement.style.opacity = '1';
                statsContainer.style.opacity = '1';
            }
        }

        function setConnectionViewMode(mode) {
            if (mode !== 'linear' && mode !== 'gravity') {
                return;
            }
            connectionViewMode = mode;

            const linearContainer = document.getElementById('connectionChainsContainer');
            const gravityContainer = document.getElementById('gravityFieldContainer');
            if (linearContainer) {
                linearContainer.style.display = mode === 'linear' ? 'block' : 'none';
            }
            if (gravityContainer) {
                gravityContainer.style.display = mode === 'gravity' ? 'block' : 'none';
            }

            const viewLinearBtn = document.getElementById('viewLinearBtn');
            const viewGravityBtn = document.getElementById('viewGravityBtn');
            if (viewLinearBtn) viewLinearBtn.classList.toggle('active', mode === 'linear');
            if (viewGravityBtn) viewGravityBtn.classList.toggle('active', mode === 'gravity');

            // 更新 Header（标题、副标题、统计指标）
            updateConnectionViewHeader();

            // 切换时刷新当前视图
            if (mode === 'gravity') {
                refreshGravityField();
            } else {
                updateConnectionView(currentRound);
            }
        }
        function ensureBridgeOverlayElements() {
            const container = document.getElementById('connectionChainsContainer');
            if (!container) {
                return null;
            }

            if (!bridgeOverlay || !container.contains(bridgeOverlay)) {
                bridgeOverlay = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                bridgeOverlay.classList.add('bridge-canvas');
                bridgePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                bridgePath.classList.add('bridge-line');
                bridgeOverlay.appendChild(bridgePath);
                container.appendChild(bridgeOverlay);
            }

            if (!bridgeButton || !container.contains(bridgeButton)) {
                bridgeButton = document.createElement('button');
                bridgeButton.type = 'button';
                bridgeButton.className = 'bridge-action';
                bridgeButton.innerHTML = '<span class="bridge-spinner"></span><span class="bridge-action-text">Bridge Gap</span>';
                bridgeButton.addEventListener('click', handleBridgeActionClick);
                container.appendChild(bridgeButton);
            }

            if (!container.dataset.bridgeListeners) {
                container.dataset.bridgeListeners = 'true';
                container.addEventListener('scroll', () => updateBridgeUI());
                window.addEventListener('resize', () => updateBridgeUI());
            }

            return container;
        }

        function clearBridgeSelections() {
            selectedBridgeChunks.forEach(item => {
                if (item.element) {
                    item.element.classList.remove('selected-bridge-node');
                }
            });
            selectedBridgeChunks = [];
            updateBridgeUI();
        }

        function toggleBridgeSelection(element, chunkId) {
            const existingIndex = selectedBridgeChunks.findIndex(item => item.id === chunkId);
            if (existingIndex >= 0) {
                const removed = selectedBridgeChunks.splice(existingIndex, 1)[0];
                if (removed && removed.element) {
                    removed.element.classList.remove('selected-bridge-node');
                }
                return;
            }

            selectedBridgeChunks.push({ id: chunkId, element });
            element.classList.add('selected-bridge-node');

            if (selectedBridgeChunks.length > 2) {
                const removed = selectedBridgeChunks.shift();
                if (removed && removed.element) {
                    removed.element.classList.remove('selected-bridge-node');
                }
            }
        }

        function getBridgeNodeCenter(element, container) {
            const rect = element.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const x = rect.left - containerRect.left + container.scrollLeft + rect.width / 2;
            const y = rect.top - containerRect.top + container.scrollTop + rect.height / 2;
            return { x, y };
        }

        function updateBridgeUI() {
            const container = ensureBridgeOverlayElements();
            if (!container || !bridgeOverlay || !bridgePath || !bridgeButton) {
                return;
            }

            if (selectedBridgeChunks.length !== 2) {
                bridgePath.setAttribute('d', '');
                bridgeButton.classList.remove('show');
                return;
            }

            const [first, second] = selectedBridgeChunks;
            if (!first.element || !second.element || !document.contains(first.element) || !document.contains(second.element)) {
                clearBridgeSelections();
                return;
            }

            const width = Math.max(container.scrollWidth, container.clientWidth);
            const height = Math.max(container.scrollHeight, container.clientHeight);
            bridgeOverlay.setAttribute('width', String(width));
            bridgeOverlay.setAttribute('height', String(height));

            const start = getBridgeNodeCenter(first.element, container);
            const end = getBridgeNodeCenter(second.element, container);
            bridgePath.setAttribute('d', `M ${start.x} ${start.y} L ${end.x} ${end.y}`);

            const midX = (start.x + end.x) / 2;
            const midY = (start.y + end.y) / 2;
            bridgeButton.style.left = `${midX}px`;
            bridgeButton.style.top = `${midY}px`;
            bridgeButton.classList.add('show');
        }

        function setBridgeButtonLoading(isLoading) {
            if (!bridgeButton) {
                return;
            }
            bridgeButton.disabled = isLoading;
            bridgeButton.classList.toggle('loading', isLoading);
            const text = bridgeButton.querySelector('.bridge-action-text');
            if (text) {
                text.textContent = isLoading ? 'Bridging...' : 'Bridge Gap';
            }
        }

        async function handleBridgeActionClick(event) {
            event.preventDefault();
            event.stopPropagation();

            if (selectedBridgeChunks.length !== 2) {
                return;
            }

            const [first, second] = selectedBridgeChunks;
            if (!first.element || !second.element) {
                return;
            }

            const firstRect = first.element.getBoundingClientRect();
            const secondRect = second.element.getBoundingClientRect();
            let start = first;
            let end = second;
            if (firstRect.left > secondRect.left || (firstRect.left === secondRect.left && firstRect.top > secondRect.top)) {
                start = second;
                end = first;
            }

            const startChunk = getChunkByDisplayId(start.id);
            const endChunk = getChunkByDisplayId(end.id);
            const startContent = startChunk ? (startChunk.content || startChunk.preview || '') : '';
            const endContent = endChunk ? (endChunk.content || endChunk.preview || '') : '';

            if (!startContent || !endContent) {
                alert('Bridge failed: missing chunk content.');
                return;
            }

            setBridgeButtonLoading(true);
            try {
                const payload = {
                    start_chunk_display_id: start.id,
                    end_chunk_display_id: end.id,
                    start_chunk_id: startChunk && startChunk.id !== undefined ? startChunk.id : start.id,
                    end_chunk_id: endChunk && endChunk.id !== undefined ? endChunk.id : end.id,
                    start_chunk_content: startContent,
                    end_chunk_content: endContent
                };

                const response = await fetch(`${API_BASE_URL}/api/bridge-chunks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`Bridge request failed: ${response.statusText}`);
                }

                const result = await response.json();

                if (result.success && result.new_chunks && result.new_chunks.length > 0) {
                    applyNewChunksFromResult(result, { sourceLabel: 'interactive' });
                    clearBridgeSelections();
                } else {
                    throw new Error(result.message || 'No new chunks returned.');
                }
            } catch (error) {
                console.error('Bridge request failed:', error);
                alert(`Bridge failed: ${error.message}`);
            } finally {
                setBridgeButtonLoading(false);
            }
        }

        function handleBridgeNodeClick(event, element, chunkId) {
            if (currentToolMode === 'select') {
                document.querySelectorAll('.connection-node').forEach(node => node.classList.remove('selected'));
                element.classList.add('selected');
                if (typeof showConnectionChunkDetail === 'function') {
                    showConnectionChunkDetail(chunkId);
                }
                clearBridgeSelections();
                return;
            }

            if (currentToolMode !== 'bridge') {
                return;
            }

            event.stopPropagation();
            toggleBridgeSelection(element, chunkId);
            updateBridgeUI();
        }

        // 保存扩展后的结果
        async function saveExtendedResults() {
            if (!attackData) {
                alert('没有数据可保存');
                return;
            }

            try {
                // 准备保存的数据（包含基线+扩展结果）
                const dataToSave = {
                    summary: attackData.summary || {},
                    timeline: attackData.timeline || [],
                    chunks: attackData.chunks || [],
                    total_chunks: attackData.total_chunks || attackData.summary?.total_chunks_in_kb || 100,
                    chunk_connections: attackData.chunk_connections || {},
                    // 保留基线信息（用于区分）
                    base_chunks: attackData.base_chunks || [],
                    base_timeline: attackData.base_timeline || [],
                    base_chunk_connections: attackData.base_chunk_connections || {},
                    // 元数据：标记这是扩展后的结果
                    metadata: {
                        saved_at: new Date().toISOString(),
                        base_rounds: attackData.base_timeline?.length || 0,
                        total_rounds: attackData.timeline?.length || 0,
                        interactive_rounds: (attackData.timeline?.length || 0) - (attackData.base_timeline?.length || 0),
                        base_chunks_count: attackData.base_chunks?.length || 0,
                        total_chunks_count: attackData.chunks?.length || 0,
                        interactive_chunks_count: (attackData.chunks?.length || 0) - (attackData.base_chunks?.length || 0)
                    }
                };

                // 方法1：尝试通过后端API保存（如果后端支持）
                try {
                    const response = await fetch(`${API_BASE_URL}/api/save-results`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(dataToSave)
                    });

                    if (response.ok) {
                        const result = await response.json();
                        alert(`✅ 保存成功！\n文件: ${result.filename || 'attack_data_extended.json'}\n路径: frontend/${result.filename}`);
                        return;
                    }
                } catch (apiError) {
                    console.log('后端API保存失败，使用浏览器下载方式:', apiError);
                }

                // 方法2：浏览器下载（备用方案）
                const jsonStr = JSON.stringify(dataToSave, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `attack_data_extended_${new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                alert('✅ 数据已下载到本地！\n文件名: ' + a.download + '\n请手动保存到 frontend/ 目录');

            } catch (error) {
                console.error('保存失败:', error);
                alert('❌ 保存失败: ' + error.message);
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
